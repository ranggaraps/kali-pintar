<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali-Pinter - Tabel Perkalian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .btn-kembali {
            align-self: flex-start;
            padding: 10px 20px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .btn-kembali:hover { transform: scale(1.05); }

        h1 {
            color: #2f3542;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px white;
            font-size: 2rem;
        }

        .grid-tabel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 10px;
        }

        .kartu-angka {
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kartu-angka:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        /* Daftar Warna Kartu Luar */
        .warna-1 { background-color: #ff6b6b; }
        .warna-2 { background-color: #4ade80; }
        .warna-3 { background-color: #60a5fa; }
        .warna-4 { background-color: #f59e0b; }
        .warna-5 { background-color: #a78bfa; }
        .warna-6 { background-color: #ec4899; }
        .warna-7 { background-color: #14b8a6; }
        .warna-8 { background-color: #f43f5e; }
        .warna-9 { background-color: #06b6d4; }
        .warna-10 { background-color: #84cc16; }

        .kartu-angka span {
            display: block;
            font-size: 14px;
            margin-top: 5px;
            font-weight: normal;
            opacity: 0.9;
        }

        /* ==================== STYLE MODAL BARU (TABEL DALAM BERWARNA) ==================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
            padding: 20px;
        }

        .modal-overlay.aktif {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-konten {
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            color: white; /* Teks dalam modal jadi putih agar kontras dengan background warna */
        }

        .modal-overlay.aktif .modal-konten {
            transform: scale(1);
        }

        .modal-judul {
            font-size: 26px;
            margin-bottom: 15px;
            text-shadow: 2px 2px rgba(0,0,0,0.2);
            border-bottom: 3px dashed rgba(255,255,255,0.4);
            padding-bottom: 10px;
        }

        .baris-perkalian {
            font-size: 22px;
            margin: 6px 0;
            background-color: rgba(255, 255, 255, 0.2); /* Efek warna transparan di setiap baris */
            padding: 5px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            text-shadow: 1px 1px rgba(0,0,0,0.1);
        }

        .btn-tutup {
            margin-top: 20px;
            padding: 10px 30px;
            background-color: white;
            color: #2f3542;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.2s;
        }

        .btn-tutup:hover {
            background-color: #f1f2f6;
        }
    </style>
</head>
<body>
    <audio id="musikGame" loop><source src="musik_anak.mp3" type="audio/mpeg"></audio>

    <button class="btn-kembali" onclick="window.location.href='index.html'">← Kembali</button>

    <h1>Silahkan Pilih Tabel Perkalian! </h1>

    <div class="grid-tabel">
        <div class="kartu-angka warna-1" onclick="bukaTabel(1, '#ff6b6b')">Perkalian 1 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-2" onclick="bukaTabel(2, '#4ade80')">Perkalian 2 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-3" onclick="bukaTabel(3, '#60a5fa')">Perkalian 3 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-4" onclick="bukaTabel(4, '#f59e0b')">Perkalian 4 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-5" onclick="bukaTabel(5, '#a78bfa')">Perkalian 5 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-6" onclick="bukaTabel(6, '#ec4899')">Perkalian 6 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-7" onclick="bukaTabel(7, '#14b8a6')">Perkalian 7 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-8" onclick="bukaTabel(8, '#f43f5e')">Perkalian 8 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-9" onclick="bukaTabel(9, '#06b6d4')">Perkalian 9 <span>Ayo Belajar!</span></div>
        <div class="kartu-angka warna-10" onclick="bukaTabel(10, '#84cc16')">Perkalian 10 <span>Ayo Belajar!</span></div>
    </div>

    <div class="modal-overlay" id="modalTabel">
        <div class="modal-konten" id="isiModal">
            <div class="modal-judul" id="judulModal">Tabel Perkalian</div>
            <div id="listPerkalian">
                </div>
            <button class="btn-tutup" onclick="tutupTabel()">Selesai Belajar ✨</button>
        </div>
    </div>

    <script>
        function bukaTabel(angka, warnaBg) {
            const modal = document.getElementById('modalTabel');
            const isiModal = document.getElementById('isiModal');
            const judulModal = document.getElementById('judulModal');
            const listPerkalian = document.getElementById('listPerkalian');

            // 1. Set warna background bagian dalam modal agar SAMA dengan warna kartu luar yang diklik
            isiModal.style.backgroundColor = warnaBg;

            // 2. Set judul perkalian
            judulModal.innerHTML = `✨ TABEL PERKALIAN ${angka} ✨`;

            // 3. Bersihkan list lama dan isi dengan deret perkalian baru berdesain menarik
            listPerkalian.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                listPerkalian.innerHTML += `
                    <div class="baris-perkalian">
                        <span>${i}</span> <span>x</span> <span>${angka}</span> <span>=</span> <span>${i * angka}</span>
                    </div>
                `;
            }

            // 4. Munculkan popup dengan animasi halus
            modal.classList.add('aktif');
        }

        function tutupTabel() {
            document.getElementById('modalTabel').classList.remove('aktif');
        }
    </script>

</body>
</html>
