<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Level - Kali-Pinter</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    width:100%;
    height:100%;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        180deg,
        #d9f5c7,
        #bdecb6
    );

    font-family:'Segoe UI',sans-serif;
}

.container-app{
    position:relative;

    width:450px;
    height:100vh;

    background-image:url('bg kosong.jpg.jpeg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

    animation:munculHalaman .8s ease;
}

.judul{
    position:absolute;

    top:90px;
    left:50%;

    transform:translateX(-50%);

    width:90%;

    text-align:center;

    color:#5d6d5d;

    font-size:38px;
    font-weight:bold;

    text-shadow:
        2px 2px 0 white,
        4px 4px 8px rgba(0,0,0,.15);

    animation:goyang 3s infinite ease-in-out;
}

.level-wrapper{
    position:absolute;

    top:250px;
    left:50%;

    transform:translateX(-50%);

    width:85%;

    display:flex;
    flex-direction:column;

    gap:20px;
}

.btn-level{
    height:85px;

    border:none;
    border-radius:40px;

    background:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:
        0 6px 15px rgba(0,0,0,.15);

    transition:.3s;
}

.btn-level:hover{
    transform:
        translateY(-5px)
        scale(1.03);
}

.btn-level:active{
    transform:scale(.95);
}

.hijau{
    border:4px solid #81c784;
    color:#4caf50;
}

.kuning{
    border:4px solid #ffd54f;
    color:#f9a825;
}

.merah{
    border:4px solid #ef5350;
    color:#e53935;
}

.btn-kembali{
    position:absolute;

    top:20px;
    left:20px;

    background:white;

    color:#36b7c8;

    text-decoration:none;

    padding:12px 20px;

    border-radius:30px;

    font-weight:bold;

    box-shadow:
        0 4px 10px rgba(0,0,0,.15);

    transition:.3s;
}

.btn-kembali:hover{
    transform:scale(1.05);
}

.btn-level:nth-child(1){
    animation:muncul .5s ease;
}

.btn-level:nth-child(2){
    animation:muncul .8s ease;
}

.btn-level:nth-child(3){
    animation:muncul 1.1s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes munculHalaman{
    from{
        opacity:0;
        transform:scale(.95);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes goyang{
    0%{
        transform:translateX(-50%) translateY(0);
    }

    50%{
        transform:translateX(-50%) translateY(-8px);
    }

    100%{
        transform:translateX(-50%) translateY(0);
    }
}
    </style>
</head>
<script>
    function pilihLevel(level){
        window.location.href =
        'game_play.html?level=' + level;
    }
    </script>
<body>

    <div class="container-app">

        <a href="index.html" class="btn-kembali">
            ⬅ Kembali
        </a>
    
        <div class="judul">
            🎯 Pilih Level Bermain
        </div>
    
        <div class="level-wrapper">
    
            <button class="btn-level hijau"
                onclick="pilihLevel('Mudah')">
                🟢 Mudah
                <br>
                <small>Perkalian 1 - 5</small>
            </button>
    
            <button class="btn-level kuning"
                onclick="pilihLevel('Menengah')">
                🟡 Menengah
                <br>
                <small>Perkalian 6 - 8</small>
            </button>
    
            <button class="btn-level merah"
                onclick="pilihLevel('Sulit')">
                🔴 Sulit
                <br>
                <small>Perkalian 9 - 12</small>
            </button>
    
        </div>
    
    </div>
</body>
</html>
